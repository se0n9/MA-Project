# COMPASS / Project HYBE - nRF52840 dual-mode firmware config.

# Bluetooth: broadcaster (iBeacon adv) + observer (passive scan).
CONFIG_BT=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="COMPASS-nRF"

# Peripheral role + Nordic UART Service (NUS) GATT server: the connectable
# attendance channel the phone app writes "CHECKIN\n" to (the device owns the
# counter and notifies "OK:<count>" back). One central at a time; the connection
# is short-lived (connect, write once, disconnect).
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_NUS=y
CONFIG_BT_MAX_CONN=1

# Connection RSSI measurement in the controller. Required for the FR5 proximity
# gate: without it the SoftDevice Controller rejects HCI Read_RSSI (0x1405) and
# bt_hci_cmd_send_sync() returns -EIO, so every CHECKIN fails the fail-safe as
# "far". (Defaults on only for BT_HCI_RAW, which this app is not.)
CONFIG_BT_CTLR_CONN_RSSI=y

# Console over UART. The logging subsystem is intentionally NOT enabled: with
# CONFIG_LOG=y (deferred mode) the BLE RX thread starves the log thread during
# scanning and no output ever flushes. Plain printk writes directly and
# synchronously to the UART in the calling context, so it cannot be starved.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_NRFX_UARTE1=y
CONFIG_GPIO=y

# C library: snprintf + sqrt/lround for the aggregation window. No %f is used
# in any format string, so newlib float-printf support is not required.
CONFIG_NEWLIB_LIBC=y
CONFIG_FPU=y

# Stacks: scan callback + JSON formatting.
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# LED matrix (HT16K33 over I2C) that the accumulated attendance count is drawn
# on. CONFIG_LED gives the led_on/led_off API used by led_display.c; the I2C bus
# carries it (matrix node in nrf52840dk_nrf52840.overlay). The TM1651 battery
# bar is bit-banged over GPIO (already enabled above), no extra Kconfig.
CONFIG_I2C=y
CONFIG_LED=y

# NOTE: CONFIG_LOG stays OFF on purpose (see the console block above). With
# CONFIG_LOG=y the BLE RX thread starves the deferred log thread during
# scanning and no printk output ever flushes -- the board looks silent on UART
# even though advertising keeps running.